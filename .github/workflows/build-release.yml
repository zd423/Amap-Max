name: Build and Release APK

on:
  push:
    branches:
      - master
    paths:
      - 'app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        shell: pwsh
        run: sdkmanager "platforms;android-31" "build-tools;34.0.0"

      - name: Prepare version
        id: version
        shell: pwsh
        run: |
          $short_sha = $env:GITHUB_SHA.Substring(0,7)
          $version_code = [Math]::Floor((Get-Date -Utc).ToUniversalTime() - (Get-Date "1970-01-01")).TotalSeconds
          $version_name = (Get-Date -Utc -Format "yyyyMMdd") + "-$short_sha"
          echo "SHORT_SHA=$short_sha" >> $env:GITHUB_ENV
          echo "APP_VERSION_CODE=$version_code" >> $env:GITHUB_ENV
          echo "APP_VERSION_NAME=$version_name" >> $env:GITHUB_ENV
          echo "version_code=$version_code" >> $env:GITHUB_OUTPUT
          echo "version_name=$version_name" >> $env:GITHUB_OUTPUT
          echo "short_sha=$short_sha" >> $env:GITHUB_OUTPUT

      - name: Build signed APK
        shell: pwsh
        env:
          ANDROID_BUILD_TOOLS_VERSION: "34.0.0"
          ANDROID_PLATFORM: android-31
          APP_VERSION_CODE: ${{ steps.version.outputs.version_code }}
          APP_VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: .\build.ps1

      - name: Generate release metadata
        shell: pwsh
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re
          import subprocess

          source_path = pathlib.Path("CHANGELOG.md")
          source = source_path.read_text(encoding="utf-8") if source_path.exists() else ""
          match = re.search(r"(?ms)^##\s+(.+?)\s*$\n(.*?)(?=^##\s+|\Z)", source)
          body = match.group(2).strip() if match else ""
          latest_subject = subprocess.check_output(
              ["git", "log", "-1", "--pretty=%s"], text=True
          ).strip()
          latest_body = subprocess.check_output(
              ["git", "log", "-1", "--pretty=%b"], text=True
          ).strip()
          if not body:
              body = "- 优化应用体验"

          lines = [line.rstrip() for line in body.splitlines() if line.strip()]
          items = []
          for line in lines:
              item = line.strip()
              if item.startswith("- "):
                  items.append(item[2:].strip())

          if latest_subject and latest_subject not in items and latest_subject not in body:
              items.append(latest_subject)
              lines.append(f"- {latest_subject}")

          if latest_body:
              for raw in latest_body.splitlines():
                  item = raw.strip().lstrip("-").strip()
                  if item and item not in items:
                      items.append(item)
                      lines.append(f"- {item}")

          body = "\n".join(lines).strip()
          release_changelog = f"# AMap Companion 更新日志\n\n## {os.environ['APP_VERSION_NAME']}\n\n{body}\n"
          release_dir = pathlib.Path("release")
          release_dir.mkdir(exist_ok=True)
          (release_dir / "CHANGELOG.md").write_text(release_changelog, encoding="utf-8")

          if not items:
              items = [body]

          built_at = subprocess.check_output(["date", "-u", "+%Y-%m-%dT%H:%M:%SZ"], text=True).strip()
          data = {
              "packageName": "com.autonavi.companion",
              "versionCode": int(os.environ['APP_VERSION_CODE']),
              "versionName": os.environ['APP_VERSION_NAME'],
              "force": False,
              "changelog": items,
              "changelogText": release_changelog,
              "commit": os.environ["GITHUB_SHA"],
              "builtAt": built_at,
              "assetName": f"amap-companion-{os.environ['SHORT_SHA']}.apk"
          }
          pathlib.Path("release-update.json").write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: amap-companion-apk
          path: amap_companion_signed.apk

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/master'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "apk-$env:APP_VERSION_CODE-$env:SHORT_SHA"
          $apk_name = "amap-companion-$env:SHORT_SHA.apk"
          Copy-Item amap_companion_signed.apk $apk_name
          gh release create $tag $apk_name release-update.json release/CHANGELOG.md `
            --repo "$env:GITHUB_REPOSITORY" `
            --target $env:GITHUB_SHA `
            --title "AMap Companion $env:APP_VERSION_NAME" `
            --notes-file release/CHANGELOG.md
